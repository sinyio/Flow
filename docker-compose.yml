services:
  db:
    image: postgres:17
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DATABASE}
    ports:
      - 5433:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flow-backend

  redis:
    image: redis:7
    restart: always
    ports:
      - 6379:6379
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - flow-backend

  backend:
    restart: always
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    command: sh -c "npx prisma db push && node dist/src/main.js"
    ports:
      - 4000:4000
    depends_on:
      - db
      - redis
    networks:
      - flow-backend
    profiles:
      - prod
      
  frontend:
    restart: always
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: ./frontend/.env
    ports:
      - 3000:3000
    depends_on:
      - backend
    networks:
      - flow-backend
    profiles:
      - prod

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_LOGIN}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}

    ports:
      - 9000:9000
      - 9001:9001

    volumes:
      - minio_data:/data

    networks:
      - flow-backend

  nginx:
    image: nginx:latest
    restart: always
    container_name: nginx
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - flow-backend
    profiles:
    - prod

volumes:
  postgres_data:
  redis_data:
  minio_data:


networks:
  flow-backend:
