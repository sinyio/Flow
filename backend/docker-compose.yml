services:
  db:
    container_name: postgres
    image: postgres:17
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - 5433:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flow-backend

  redis:
    container_name: redis
    image: redis:8
    restart: always
    ports:
      - 6379:6379
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - flow-backend

  backend:
    container_name: backend
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - 4000:4000
    depends_on:
      - db
      - redis
    networks:
      - flow-backend
    profiles:
      - prod-back

volumes:
  postgres_data:
  redis_data:

networks:
  flow-backend: